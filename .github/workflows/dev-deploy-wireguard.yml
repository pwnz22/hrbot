name: Dev Deploy via WireGuard

on:
  push:
    branches: [dev]
  workflow_dispatch:

env:
  WORKING_PATH: ~/dev_hr_bot_instance

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          path: ${{ env.WORKING_PATH }}

      - name: Install WireGuard
        run: |
          sudo apt-get update
          sudo apt-get install -y wireguard resolvconf

      - name: Setup WireGuard connection
        run: |
          echo "${{ secrets.WIREGUARD_CONFIG }}" | sudo tee /etc/wireguard/wg0.conf > /dev/null
          sudo chmod 600 /etc/wireguard/wg0.conf
          sudo wg-quick up wg0
          sleep 3

      - name: Verify WireGuard connection
        run: |
          sudo wg show
          echo "Testing connection to server..."
          ping -c 5 ${{ secrets.SERVER_VPN_IP }}
          ip addr show wg0
          echo "Waiting for SSH to be available..."
          for i in {1..30}; do
            nc -zv ${{ secrets.SERVER_VPN_IP }} 22 2>&1 && break
            echo "Attempt $i: SSH not ready, waiting..."
            sleep 2
          done

      - name: Copy files to server
        run: |
          scp -r -o StrictHostKeyChecking=no ${{ env.WORKING_PATH }} ${{ secrets.DEPLOY_USER }}@${{ secrets.SERVER_VPN_IP }}:~/

      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_VPN_IP }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: WORKING_PATH
          script: |
            cd ~/"$WORKING_PATH"
            curl -L -o .env "${{ secrets.DEV_ENV_FILE_URL }}"
            docker compose up --build -d

      - name: Cleanup WireGuard
        if: always()
        run: sudo wg-quick down wg0 || true
